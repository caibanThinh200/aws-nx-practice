name: Deploy Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/api/**'
      - '.github/workflows/preview.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to AWS (Preview)
        working-directory: packages/api
        run: |
          npx serverless deploy \
            --stage pr-${{ github.event.pull_request.number }} \
            --region ${{ env.AWS_REGION }} \
            --verbose

      - name: Get API URL
        id: get-url
        working-directory: packages/api
        run: |
          API_URL=$(npx serverless info \
            --stage pr-${{ github.event.pull_request.number }} \
            --region ${{ env.AWS_REGION }} \
            | grep "endpoint:" | awk '{print $2}')
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const apiUrl = '${{ steps.get-url.outputs.api_url }}';
            const prNumber = context.payload.pull_request.number;

            const comment = `## 🚀 Preview Environment Deployed

            **API Endpoint**: ${apiUrl}
            **Stack Name**: org-api-pr-${prNumber}
            **Region**: ${{ env.AWS_REGION }}

            This preview environment will be automatically deleted when the PR is closed.

            ### Test it:
            \`\`\`bash
            curl ${apiUrl}/api/items
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
